databases:
  - name: assgrade-db
    databaseName: exam_platform
    user: assgrade
    plan: basic-256mb
    region: frankfurt

services:
  - type: web
    name: assgrade-backend
    runtime: node
    plan: starter
    region: frankfurt
    rootDir: .
    buildCommand: npm ci && npm exec prisma generate --workspace backend && npm run build --workspace backend
    preDeployCommand: npm exec prisma db push --workspace backend && npm --workspace backend run prisma:seed
    startCommand: npm --workspace backend run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: assgrade-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_RESET_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: JWT_RESET_TTL
        value: 30m
      - key: APP_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_ADMIN_FIRST_NAME
        value: Super
      - key: SEED_ADMIN_LAST_NAME
        value: Admin

  - type: web
    name: assgrade-frontend
    runtime: node
    plan: starter
    region: frankfurt
    rootDir: .
    buildCommand: npm ci && npm run build --workspace frontend
    startCommand: npm --workspace frontend run start -- -H 0.0.0.0 -p $PORT
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_API_URL
        sync: false
